name: Deploy Laravel via Webhook

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build Dependencies and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Get latest code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, mysqlnd

      - name: Install Composer Dependencies
        run: composer install --no-dev --optimize-autoloader --prefer-dist

      - name: Create Deployment Package (ZIP)
        run: |
          zip -r deploy.zip . -x "*.git*" -x ".github*" -x "node_modules*" -x ".env*" -x "tests*" -x "phpunit.xml"

      - name: Trigger Webhook and Upload Package
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Content-Type: application/octet-stream" \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            --data-binary @deploy.zip \
            "https://ecom1.premiumtouchbd.com/deploy.php?token=${{ secrets.DEPLOY_SECURE_TOKEN }}")
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n 1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          
          echo "Response Body: $BODY"
          echo "HTTP Code: $HTTP_CODE"
          
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "Deployment failed with HTTP code $HTTP_CODE"
            exit 1
          fi
